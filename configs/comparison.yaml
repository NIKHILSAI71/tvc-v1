# Comparison Configuration
# Balanced settings for comparing all methods

experiment_name: "comparison"
output_dir: "./results/comparison"
use_safety_filter: true
save_models: true
save_plots: true
eval_episodes: 100
eval_seed: 42

# Plant Parameters - Balanced for all methods
plant:
  mass: 1.0
  moment_of_inertia: 0.1
  length: 1.0
  nominal_thrust: 15.0
  max_gimbal_angle: 0.524
  max_angle: 0.785
  max_angular_rate: 6.28

# LQR Controller Parameters - Balanced
lqr:
  Q: null
  R: 1.0
  clg_gamma: 2.0

# Safety Filter Parameters - Moderate safety
safety:
  angle_cbf_alpha: 3.0
  rate_cbf_alpha: 2.0
  clf_penalty: 1000.0

# Evolution Parameters - Moderate for fair comparison
evolution:
  population_size: 1000        # Full population as per video
  max_generations: 300         # Reasonable training time
  sim_duration: 5.0
  mutation_strength: 0.1

# PPO Parameters - Moderate for fair comparison
ppo:
  total_frames: 1000000        # Reasonable training time
  frames_per_batch: 2048
  clip_epsilon: 0.2
  lr_actor: 0.0003
  lr_critic: 0.0003

# Simulation Parameters - Balanced
simulation:
  timestep: 0.001
  control_timestep: 0.01
  max_episode_steps: 1000