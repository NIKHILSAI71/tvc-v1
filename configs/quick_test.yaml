# Quick Test Configuration
# For rapid testing and development

experiment_name: "quick_test"
output_dir: "./results/quick_test"
use_safety_filter: true
save_models: false           # Skip model saving for speed
save_plots: true
eval_episodes: 20            # Minimal episodes for speed
eval_seed: 42

# Plant Parameters - Standard
plant:
  mass: 1.0
  moment_of_inertia: 0.1
  length: 1.0
  nominal_thrust: 15.0
  max_gimbal_angle: 0.524
  max_angle: 0.785
  max_angular_rate: 6.28

# LQR Controller Parameters
lqr:
  Q: null
  R: 1.0
  clg_gamma: 2.0

# Safety Filter Parameters
safety:
  angle_cbf_alpha: 3.0
  rate_cbf_alpha: 2.0
  clf_penalty: 1000.0

# Evolution Parameters - Minimal for testing
evolution:
  population_size: 100         # Small population
  max_generations: 50          # Few generations
  sim_duration: 2.0            # Short simulation
  mutation_strength: 0.1

# PPO Parameters - Minimal for testing
ppo:
  total_frames: 100000         # Minimal training
  frames_per_batch: 512        # Small batches
  clip_epsilon: 0.2
  lr_actor: 0.001              # Higher LR for faster learning
  lr_critic: 0.001

# Simulation Parameters - Fast simulation
simulation:
  timestep: 0.002              # Coarser timestep
  control_timestep: 0.02       # Slower control updates
  max_episode_steps: 500       # Short episodes