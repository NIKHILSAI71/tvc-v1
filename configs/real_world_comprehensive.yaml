# Enhanced Real-World TVC Training Configuration
# Comprehensive training with all realistic scenarios

experiment_name: "real_world_comprehensive"
output_dir: "./results/real_world_comprehensive"
use_safety_filter: true
save_models: true
save_plots: true
eval_episodes: 200
eval_seed: 42

# Enable curriculum learning
curriculum_learning: true
total_training_episodes: 10000
scenario_progression: true

# Plant Parameters - Realistic rocket based on real TVC systems
plant:
  mass: 1000.0                    # 1000kg rocket
  moment_of_inertia: 833.33       # kg⋅m² (realistic for 10m rocket)
  length: 10.0                    # 10m rocket length
  nominal_thrust: 15000.0         # 15kN (1.5x weight for hover margin)
  max_thrust: 20000.0             # 20kN maximum
  min_thrust: 3000.0              # 3kN minimum (20% throttle)
  max_gimbal_angle: 0.2617993877991494  # ±15 degrees (realistic limit)
  max_gimbal_rate: 1.5708         # ±90 deg/s gimbal rate
  gravity: 9.81
  max_angle: 1.047                # ±60 degrees (wide flight envelope)
  max_angular_rate: 4.189         # ±240 deg/s (high performance)
  disturbance_torque_std: 100.0   # 100 N⋅m disturbance
  sensor_noise_std: 0.005         # 0.3 degree noise

# Enhanced MuJoCo Environment Parameters
mujoco_env:
  timestep: 0.00025               # 0.25ms physics timestep
  control_timestep: 0.005         # 200Hz control loop
  planar_2d: false                # Full 3D simulation
  
  # Environmental realism
  enable_wind: true
  enable_turbulence: true
  enable_altitude_effects: true
  enable_ground_effect: true
  enable_fuel_consumption: true
  enable_engine_degradation: false
  
  # Advanced dynamics
  enable_aerodynamics: true
  enable_propellant_slosh: true
  enable_structural_flexibility: false
  
  # Actuator dynamics (50Hz bandwidth)
  actuator_bandwidth: 50.0
  actuator_delay_steps: 1
  actuator_noise_std: 0.0005
  
  # Sensor parameters
  imu_noise_std: 0.001
  gyro_noise_std: 0.002
  gps_noise_std: 0.1

# LQR Controller Parameters - High performance
lqr:
  Q: [[1000, 0, 0, 0], [0, 1000, 0, 0], [0, 0, 100, 0], [0, 0, 0, 100]]
  R: [[0.1, 0], [0, 0.1]]  # Lower penalty for aggressive control
  clg_gamma: 1.5

# Safety Filter Parameters - Conservative but allowing performance
safety:
  max_velocity: 100.0             # High velocity limit
  max_angle: 1.047                # ±60 degrees
  angle_cbf_alpha: 2.0            # Moderate safety margins
  rate_cbf_alpha: 1.5
  lyapunov_eps: 0.05
  clf_penalty: 1000.0
  barrier_alpha: 2.0

# Evolution Parameters - Comprehensive evolution
evolution:
  population_size: 1500           # Large population for complex scenarios
  max_generations: 800            # Extended evolution
  sim_duration: 8.0               # Longer evaluation
  mutation_strength: 0.15         # Moderate mutation
  elite_ratio: 0.15               # Keep more elites
  mutation_ratio: 0.6
  random_ratio: 0.25              # More exploration
  num_trials: 5                   # Multiple trials for robustness
  angle_weight: 1.0
  jerk_weight: 0.05               # Reduced jerk penalty for performance
  safety_penalty: 20.0            # Higher safety penalty
  use_multiprocessing: true
  
  # Scenario-specific parameters
  scenario_weights:
    basic_hovering: 0.2
    moderate_hovering: 0.2
    disturbance_rejection: 0.15
    launch_phase: 0.1
    high_dynamics: 0.1
    wind_rejection: 0.1
    landing_phase: 0.08
    engine_out: 0.05
    precision_landing: 0.02

# PPO Parameters - Enhanced for complex scenarios
ppo:
  total_frames: 5000000           # Extended training
  frames_per_batch: 8192          # Larger batches
  mini_batch_size: 256
  epochs_per_batch: 20            # More optimization per batch
  clip_epsilon: 0.25              # Higher exploration
  entropy_bonus: 0.02             # More exploration
  value_loss_coeff: 0.5
  max_grad_norm: 1.0
  
  # Learning rates with scheduling
  lr_actor: 0.0008                # Higher initial learning rate
  lr_critic: 0.001
  lr_scheduler_gamma: 0.998       # Gradual decay
  
  # GAE parameters
  gamma: 0.995                    # Longer time horizon
  lambda_gae: 0.95
  
  # Environment parameters
  max_episode_length: 2000        # 10 seconds at 200Hz
  num_envs: 4                     # Parallel environments
  
  # Residual policy constraints
  residual_scale: 0.5             # Larger residual authority
  
  # Scenario mixing during training
  scenario_curriculum: true
  curriculum_episodes: [1000, 2000, 3000, 4000]  # Difficulty progression

# MPC Parameters - High performance predictive control
mpc:
  Q: [[1000, 0], [0, 100]]        # State weighting
  R: 0.1                          # Control weighting
  N: 30                           # Longer prediction horizon
  dt: 0.005                       # 200Hz prediction
  du_rate_limit: true
  warm_start: true
  terminal_lqr: true
  max_iterations: 50

# Evaluation Parameters - Comprehensive testing
evaluation:
  scenarios: [
    "basic_hovering",
    "moderate_hovering", 
    "disturbance_rejection",
    "launch_phase",
    "high_dynamics",
    "wind_rejection",
    "landing_phase",
    "engine_out",
    "precision_landing",
    "emergency_recovery"
  ]
  episodes_per_scenario: 20
  monte_carlo_seeds: 10
  performance_metrics: [
    "rms_angle_error",
    "max_angle_deviation", 
    "settling_time",
    "control_effort",
    "safety_violations",
    "success_rate"
  ]

# Advanced Training Features
advanced:
  # Weights & Biases tracking
  use_wandb: true
  wandb_project: "tvc_real_world"
  wandb_tags: ["comprehensive", "real_world", "200hz"]
  
  # Hyperparameter optimization
  use_optuna: false               # Enable for hyperparameter search
  optuna_trials: 100
  
  # Model checkpointing
  checkpoint_frequency: 50000     # Every 50k steps
  save_best_only: false
  
  # Performance optimization
  use_vectorized_env: true
  parallel_evaluation: true
  gpu_acceleration: true

# Logging and Monitoring
logging:
  log_level: "INFO"
  log_frequency: 1000             # Log every 1000 steps
  save_training_curves: true
  save_control_trajectories: true
  save_scenario_performance: true
  
  # Video recording
  record_videos: true
  video_frequency: 10000          # Every 10k steps
  video_scenarios: ["high_dynamics", "landing_phase", "emergency_recovery"]